name: Deploy to GCP

on:
  push:
    branches:
      - deploy/gcp   # staging
      - main         # prod

env:
  PROJECT_ID: zkairdrop
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  IMAGE: us-central1-docker.pkg.dev/zkairdrop/archive/archive

jobs:
  deploy:
    name: Build → Migrate → Deploy (${{ github.ref_name }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    environment: ${{ github.ref_name == 'main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image tag
        id: tag
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      # ── Build & push Docker image ──────────────────────────────────────────

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID="${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_KEY="${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}" \
            --build-arg NEXT_PUBLIC_POSTHOG_HOST="https://us.i.posthog.com" \
            -t ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }} \
            -t ${{ env.IMAGE }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }}
          docker push ${{ env.IMAGE }}:latest

      # ── Run DB migrations (pre-deploy, against Cloud SQL via proxy) ────────

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Install Cloud SQL Auth Proxy
        run: |
          curl -Lo /usr/local/bin/cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x /usr/local/bin/cloud-sql-proxy

      - name: Run DB migrations
        run: |
          # Start proxy in background (Cloud SQL is in the 'zkemail' project)
          cloud-sql-proxy zkemail:${{ env.REGION }}:dkimregistry --port 5433 &
          PROXY_PID=$!
          sleep 5

          # Run migrations (idempotent — skips already-applied ones)
          DATABASE_URL="postgresql://${{ secrets.CLOUD_SQL_DB_USER }}:${{ secrets.CLOUD_SQL_DB_PASSWORD }}@127.0.0.1:5433/prodduplicate_new_archive" \
            pnpm prisma migrate deploy

          kill $PROXY_PID

      # ── Deploy to Cloud Run ────────────────────────────────────────────────

      - name: Determine Cloud Run service name and workspace
        id: service
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "name=archive-prod"   >> "$GITHUB_OUTPUT"
            echo "workspace=main"      >> "$GITHUB_OUTPUT"
          else
            echo "name=archive-pr"       >> "$GITHUB_OUTPUT"
            echo "workspace=pr-validation" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ steps.service.outputs.name }} \
            --image ${{ env.IMAGE }}:${{ steps.tag.outputs.tag }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --add-cloudsql-instances zkemail:${{ env.REGION }}:dkimregistry \
            --service-account ${{ secrets.GCP_CLOUD_RUN_SERVICE_ACCOUNT }} \
            --update-secrets=DATABASE_URL=archive-database-url-${{ steps.service.outputs.workspace }}:latest,AUTH_GOOGLE_ID=archive-auth-google-id-${{ steps.service.outputs.workspace }}:latest,AUTH_GOOGLE_SECRET=archive-auth-google-secret-${{ steps.service.outputs.workspace }}:latest,AUTH_SECRET=archive-auth-secret-${{ steps.service.outputs.workspace }}:latest,CRON_SECRET=archive-cron-secret-${{ steps.service.outputs.workspace }}:latest,CLOUD_TASKS_QUEUE_NAME=archive-cloud-tasks-queue-name-${{ steps.service.outputs.workspace }}:latest,CLOUD_FUNCTION_URL=archive-cloud-function-url-${{ steps.service.outputs.workspace }}:latest,TASKS_SERVICE_ACCOUNT_EMAIL=archive-tasks-service-account-email-${{ steps.service.outputs.workspace }}:latest \
            --set-env-vars NODE_ENV=production,AUTH_TRUST_HOST=true,GOOGLE_CLOUD_PROJECT_ID=${{ env.PROJECT_ID }},GOOGLE_CLOUD_REGION=${{ env.REGION }},NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }},NEXT_PUBLIC_POSTHOG_HOST=https://us.i.posthog.com,AUTH_URL=${{ steps.service.outputs.name == 'archive-prod' && 'https://archive.zk.email' || 'https://staging.archive.zk.email' }} \
            --min-instances 1 \
            --max-instances 10 \
            --memory 1Gi \
            --cpu 1 \
            --timeout 60 \
            --no-traffic

      - name: Verify deployment health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ steps.service.outputs.name }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Deployed to: $SERVICE_URL"
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SERVICE_URL}/api/health")
            if [[ "$STATUS" == "200" ]]; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i: got $STATUS, retrying..."
            sleep 10
          done
          if [[ "$STATUS" != "200" ]]; then
            echo "Health check failed — rolling back traffic"
            gcloud run services update-traffic ${{ steps.service.outputs.name }} \
              --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} \
              --to-revisions=CURRENT=100
            exit 1
          fi

      - name: Shift traffic to new revision
        run: |
          gcloud run services update-traffic ${{ steps.service.outputs.name }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --to-latest
