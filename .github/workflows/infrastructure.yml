name: Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy infrastructure to'
        required: true
        type: choice
        options:
          - staging
          - production

jobs:
  terraform:
    name: Terraform (${{ github.event.inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    environment: ${{ github.event.inputs.environment }}

    env:
      # Non-secret infrastructure config — safe to hardcode
      TF_VAR_project_id: "zkairdrop"
      TF_VAR_region: "us-central1"
      TF_VAR_cloud_sql_instance: "zkemail:us-central1:dkimregistry"
      TF_VAR_cloud_sql_db_user: "render"
      TF_VAR_cloud_sql_db_name: "prodduplicate_new_archive"
      TF_VAR_next_public_google_client_id: "397234807794-k440ped0h9fl4k9125rjmqn9mri6lr4r.apps.googleusercontent.com"
      TF_VAR_auth_google_id: "397234807794-k440ped0h9fl4k9125rjmqn9mri6lr4r.apps.googleusercontent.com"
      TF_VAR_cloud_tasks_queue_name: "gcd-calculator-queue-prod-prod-6c0b"
      TF_VAR_cloud_function_url: "https://gcd-calculator-prod-prod-wyldgq6aqa-uc.a.run.app"
      TF_VAR_tasks_service_account_email: "tasks-prod-prod@zkairdrop.iam.gserviceaccount.com"
      # Secrets — must be set as GitHub Actions secrets
      TF_VAR_db_password: ${{ secrets.CLOUD_SQL_DB_PASSWORD }}
      TF_VAR_auth_google_secret: ${{ secrets.AUTH_GOOGLE_SECRET }}
      TF_VAR_auth_secret: ${{ secrets.AUTH_SECRET }}
      TF_VAR_cron_secret: ${{ secrets.CRON_SECRET }}
      TF_VAR_posthog_key: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Select workspace
        id: workspace
        run: |
          if [[ "${{ github.event.inputs.environment }}" == "production" ]]; then
            echo "name=main" >> "$GITHUB_OUTPUT"
          else
            echo "name=pr-validation" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Workspace
        working-directory: terraform
        run: |
          terraform workspace select ${{ steps.workspace.outputs.name }} \
            || terraform workspace new ${{ steps.workspace.outputs.name }}

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
